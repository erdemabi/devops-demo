trigger:
- main 

pool:
  name: Default

steps:
# .NET 10 SDK kurulumu (Runtime yerine SDK seçilmeli)
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '10.0.x'

# Restore aşamasında proje dosyasını seçiyoruz
- task: DotNetCoreCLI@2
  displayName: 'Restore'
  inputs:
    command: 'restore'
    projects: '**/*.csproj' # Veya doğrudan 'BasitWebSitesi/BasitWebSitesi.csproj'

# Build aşamasında proje dosyasını seçiyoruz
- task: DotNetCoreCLI@2
  displayName: 'Build'
  inputs:
    command: 'build'
    projects: '**/*.csproj'
    arguments: '--configuration Release'

# Publish aşaması
- task: DotNetCoreCLI@2
  displayName: 'Publish'
  inputs:
    command: 'publish'
    publishWebProjects: true
    projects: '**/*.csproj'
    arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'
    zipAfterPublish: true

# Artifact'ları sisteme yüklüyoruz
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'

- task: AzureRmWebAppDeployment@5
  inputs:
    ConnectionType: 'AzureRM'
    azureSubscription: 'SC-Azure-Erdem-test'
    appType: 'webApp'
    WebAppName: 'erdemabi'
    packageForLinux: '$(Build.ArtifactStagingDirectory)/**/*.zip'
    enableCustomDeployment: true
    DeploymentType: 'zipDeploy'