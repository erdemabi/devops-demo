<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>.NET 10 Basit Web Sitesi</title>
  <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
  <main class="container">
    <section class="hero">
      <p class="badge">ASP.NET Core / .NET 10</p>
      <h1>Basit bir web sitesi hazır</h1>
      <p class="lead">
        Bu proje .NET 10 ile build alabileceğin sade bir ASP.NET Core web uygulamasıdır.
      </p>
      <div class="actions">
        <button id="loadMessage">API mesajını getir</button>
      </div>
      <div id="result" class="result">
        Butona basınca <code>/api/message</code> endpoint'inden veri gelecek.
      </div>
    </section>
  </main>

  <script src="/js/site.js"></script>
</body>
</html>
